services:

  db:
    image: postgres:16-alpine
    container_name: market-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/migrations/001_create_market.sql:/docker-entrypoint-initdb.d/001_create_market.sql
      - ./db/migrations/002_create_users.sql:/docker-entrypoint-initdb.d/002_create_users.sql
      - ./db/migrations/003_add_roles_to_users.sql:/docker-entrypoint-initdb.d/003_add_roles_to_users.sql 
      - ./db/migrations/004_add_unique_name_to_food.sql:/docker-entrypoint-initdb.d/004_add_unique_name_to_food.sql
      - ./db/migrations/005_create_refresh_tokens.sql:/docker-entrypoint-initdb.d/005_create_refresh_tokens.sql
      # the above migration is added for adding the column to already existing users table, to add the column named 'role' with default value as User
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 10s
      retries: 5

  api:
    build: .
    container_name: market-api
    environment:
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
      - "50051:50051"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata: