syntax = "proto3";

package market;

option go_package = "rest/protobuf";

service MarketService{
    
    rpc ListAllFoodItems(ListAllFoodItemsRequest) returns (ListAllFoodItemsResponse) {};
	rpc ListFoodItem(ListFoodItemRequest) returns (ListFoodItemResponse) {};
	rpc UpdateFoodItem(UpdateFoodItemRequest) returns (UpdateFoodItemResponse) {};
	rpc AddFoodItem(AddFoodItemRequest) returns (AddFoodItemResponse) {};
	rpc DeleteFoodItem(DeleteFoodItemRequest) returns (DeleteFoodItemResponse) {};

}

message FoodItem{
    string name = 1;
    float price = 2;
    int32 calories = 3;
    float sugar = 4;
}

message ListAllFoodItemsRequest{
    // empty request, we just receive the list of all food items there are.
}

message ListAllFoodItemsResponse{
    repeated FoodItem items = 1;
}

message ListFoodItemRequest{
    string name = 1;
}

message ListFoodItemResponse{
    FoodItem item = 1;
}

message UpdateFoodItemRequest {
    string name = 1;
    FoodItem item = 2;
}

message UpdateFoodItemResponse{
    string message = 1;
}

message AddFoodItemRequest{
    FoodItem item = 1;
}

message AddFoodItemResponse{
    string message = 1;
}

message DeleteFoodItemRequest{
    string name = 1;
}

message DeleteFoodItemResponse{
    string message = 1;
}
